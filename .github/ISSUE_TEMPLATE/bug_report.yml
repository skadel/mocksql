name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.

  - type: input
    id: version
    attributes:
      label: MockSQL version
      placeholder: e.g. 0.3.1
    validations:
      required: true

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - CLI
        - Web Hub
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `mocksql ...`
        2. Paste the SQL query ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: text

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14 / Ubuntu 22.04 / Windows 11
        Python: 3.12.x
        DB dialect: bigquery / postgres
